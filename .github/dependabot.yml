# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"
    groups:
      mittwald-api:
        patterns:
          - "@mittwald/api-*"
      oclif-plugins:
        patterns:
          - "@oclif/plugin-*"
      marked:
        patterns:
          - marked
          - marked-terminal
      jest:
        patterns:
          - "jest"
          - "ts-test"
          - "@jest/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "@typescript-eslint/*"
    ignore:
      # typescript 7 is the native (Go) port: the package ships only the tsgo
      # binary and no longer exposes the JS compiler API. typescript-eslint
      # (peer: <6.1.0) and ts-jest (peer: <7) both read that API and crash on
      # it, so lint and unit tests break. Drop this once both support v7.
      - dependency-name: "typescript"
        versions: ["7.x"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
